services:
  - type: web
    name: simple-website
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /styles.css
        name: Cache-Control
        value: public, max-age=3600
      - path: /script.js
        name: Cache-Control
        value: public, max-age=3600
